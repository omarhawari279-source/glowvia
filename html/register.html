<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Inscription • Glowvia</title>
    <link rel="stylesheet" href="../css/register.css">
    <script defer src="register.js"></script>
</head>
<body>
 
<header class="header">
    <div class="container">
        <img src="../images/glowvia.png" class="logo">
        <nav class="nav">
    <a href="index.html">Home</a>
    <a href="register.html">Inscription</a>
    <a href="products.html">Produits & Commandes</a>
    <a href="contact.html">Contact</a> <!-- جديد -->
</nav>
    </div>
</header>

<section class="form-section">
    <h2>Créer un compte Glowvia</h2>
    <form id="registerForm">

        <h3>Informations personnelles</h3>

        <label>Nom *</label>
        <input type="text" id="lastname" required>

        <label>Prénom *</label>
        <input type="text" id="firstname" required>

        <label>Email *</label>
        <input type="email" id="email" required>

        <label>Numéro de téléphone</label>
        <input type="text" id="phone">

        <label>Date de naissance</label>
        <input type="date" id="birthday">

        <h3>Informations du compte</h3>

        <label>Nom d'utilisateur *</label>
        <input type="text" id="username" required>

        <label>Mot de passe *</label>
        <input type="password" id="password" required>

        <label>Confirmer le mot de passe *</label>
        <input type="password" id="confirmPassword" required>

        <h3>Préférences</h3>

        <div class="check-group">
            <label><input type="checkbox" id="newsletter"> Newsletters</label>
            <label><input type="checkbox" id="promo"> Offres promotionnelles</label>
        </div>

        <div class="radio-group">
            <p>Genre :</p>
            <label><input type="radio" name="gender" value="Homme"> Homme</label>
            <label><input type="radio" name="gender" value="Femme"> Femme</label>
        </div>

        <label>Pays</label>
        <select id="country">
            <option value="">-- Choisir --</option>
            <option value="Tunisie">Tunisie</option>
            <option value="France">France</option>
        </select>

        <label>Ville</label>
        <select id="city">
            <option value="">-- Choisir --</option>
            <option value="Tunis">Tunis</option>
            <option value="Sfax">Sfax</option>
        </select>

        <div class="terms">
            <label><input type="checkbox" id="terms" required> J’accepte les conditions générales *</label>
        </div>

        <button type="submit" class="btn">S'inscrire</button>
        <button type="reset" class="btn reset">Réinitialiser</button>

        <p id="message"></p>

    </form>
</section>

</body>
</html>
